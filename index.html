<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom Riddle's Diary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --leather-dark: #1a0f0f;
            --leather-mid: #2d1810;
            --leather-light: #4a2c1a;
            --parchment: #f4e8d0;
            --parchment-aged: #e8d5b5;
            --ink-dark: #0d0d0d;
            --ink-blood: #3d1a1a;
            --glow-green: #2d5016;
            --gold-accent: #8b7355;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0f0f 50%, #0d0505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            perspective: 1500px;
        }
        
        /* Magical Particles Canvas */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        /* Main Diary Container */
        .diary-container {
            position: relative;
            width: 90vw;
            max-width: 900px;
            height: 85vh;
            z-index: 10;
            transform-style: preserve-3d;
            animation: diaryFloat 6s ease-in-out infinite;
        }
        
        @keyframes diaryFloat {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-10px) rotateX(0deg); }
        }
        
        /* Leather Cover */
        .diary-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(74, 44, 26, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(45, 24, 16, 0.4) 0%, transparent 50%),
                repeating-linear-gradient(
                    90deg,
                    var(--leather-dark) 0px,
                    var(--leather-mid) 2px,
                    var(--leather-dark) 4px
                ),
                linear-gradient(180deg, var(--leather-dark) 0%, var(--leather-mid) 50%, var(--leather-dark) 100%);
            border-radius: 8px 20px 20px 8px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.8),
                inset 0 0 100px rgba(0, 0, 0, 0.5),
                5px 0 20px rgba(0, 0, 0, 0.6);
            transform-style: preserve-3d;
        }
        
        .diary-cover::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, 
                transparent 0%,
                var(--gold-accent) 10%,
                var(--gold-accent) 90%,
                transparent 100%
            );
            opacity: 0.6;
        }
        
        /* Corner Decorations */
        .corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid var(--gold-accent);
            opacity: 0.4;
        }
        
        .corner.top-left {
            top: 20px;
            left: 60px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner.top-right {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner.bottom-left {
            bottom: 20px;
            left: 60px;
            border-right: none;
            border-top: none;
        }
        
        .corner.bottom-right {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }
        
        /* Diary Title on Cover */
        .diary-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--gold-accent);
            opacity: 0.6;
        }
        
        .diary-title h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .diary-title .name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(139, 115, 85, 0.3);
        }
        
        /* The Open Book */
        .book {
            position: absolute;
            width: calc(100% - 60px);
            height: calc(100% - 40px);
            top: 20px;
            left: 50px;
            background: var(--parchment);
            border-radius: 5px 15px 15px 5px;
            transform-style: preserve-3d;
            box-shadow: 
                inset 0 0 60px rgba(139, 69, 19, 0.15),
                0 0 40px rgba(0, 0, 0, 0.5);
        }
        
        /* Parchment Texture */
        .book::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 69, 19, 0.03) 2px,
                    rgba(139, 69, 19, 0.03) 4px
                ),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            border-radius: 5px 15px 15px 5px;
        }
        
        /* Spine */
        .spine {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 40px;
            transform: translateX(-50%);
            background: linear-gradient(90deg, 
                transparent 0%,
                rgba(139, 69, 19, 0.1) 20%,
                rgba(139, 69, 19, 0.2) 50%,
                rgba(139, 69, 19, 0.1) 80%,
                transparent 100%
            );
            box-shadow: 
                inset -2px 0 5px rgba(0, 0, 0, 0.1),
                inset 2px 0 5px rgba(0, 0, 0, 0.1);
        }
        
        /* Pages Container */
        .pages-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            perspective: 1000px;
        }
        
        .page {
            flex: 1;
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
        }
        
        .page.left {
            border-right: 1px solid rgba(139, 69, 19, 0.2);
        }
        
        .page.right {
            border-left: 1px solid rgba(139, 69, 19, 0.1);
        }
        
        /* Page Lines */
        .page-lines {
            position: absolute;
            top: 60px;
            left: 30px;
            right: 30px;
            bottom: 40px;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 28px,
                rgba(139, 69, 19, 0.15) 28px,
                rgba(139, 69, 19, 0.15) 29px
            );
            pointer-events: none;
        }
        
        /* Page Number */
        .page-number {
            position: absolute;
            bottom: 15px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: rgba(139, 69, 19, 0.5);
        }
        
        .page.left .page-number {
            right: 30px;
        }
        
        .page.right .page-number {
            left: 30px;
        }
        
        /* Content Area */
        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(139, 69, 19, 0.3) transparent;
        }
        
        .content::-webkit-scrollbar {
            width: 6px;
        }
        
        .content::-webkit-scrollbar-thumb {
            background: rgba(139, 69, 19, 0.3);
            border-radius: 3px;
        }
        
        /* Messages */
        .message {
            margin-bottom: 20px;
            line-height: 29px;
            font-size: 1.15rem;
            position: relative;
        }
        
        .message.user {
            color: var(--ink-dark);
            text-align: left;
            padding-left: 10px;
            border-left: 2px solid rgba(139, 69, 19, 0.3);
        }
        
        .message.tom {
            color: var(--ink-blood);
            font-style: italic;
            text-align: right;
            padding-right: 10px;
            border-right: 2px solid rgba(61, 26, 26, 0.4);
        }
        
        /* Writing Animation */
        .writing {
            overflow: hidden;
            white-space: pre-wrap;
            animation: writeText 0.05s steps(1) forwards;
        }
        
        @keyframes writeText {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Ink Bleed Effect */
        .ink-bleed {
            position: relative;
        }
        
        .ink-bleed::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(61, 26, 26, 0.1) 0%, transparent 70%);
            animation: inkSpread 2s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes inkSpread {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        /* Magical Glow for Tom's messages */
        .glow-text {
            animation: textGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes textGlow {
            0% { text-shadow: 0 0 5px rgba(45, 80, 22, 0.3); }
            100% { text-shadow: 0 0 15px rgba(45, 80, 22, 0.6), 0 0 25px rgba(45, 80, 22, 0.3); }
        }
        
        /* Input Area */
        .input-container {
            position: absolute;
            bottom: 60px;
            left: 30px;
            right: 30px;
            z-index: 20;
        }
        
        .ink-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(139, 69, 19, 0.4);
            padding: 10px 5px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: var(--ink-dark);
            outline: none;
            transition: all 0.3s ease;
        }
        
        .ink-input:focus {
            border-bottom-color: rgba(61, 26, 26, 0.6);
            box-shadow: 0 2px 10px rgba(61, 26, 26, 0.1);
        }
        
        .ink-input::placeholder {
            color: rgba(139, 69, 19, 0.4);
            font-style: italic;
        }
        
        /* Writing Indicator */
        .writing-indicator {
            position: absolute;
            bottom: 35px;
            right: 30px;
            display: none;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: rgba(61, 26, 26, 0.6);
            font-style: italic;
        }
        
        .writing-indicator.active {
            display: flex;
        }
        
        .quill-icon {
            width: 20px;
            height: 20px;
            animation: quillWrite 0.5s ease-in-out infinite;
        }
        
        @keyframes quillWrite {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(-2px); }
        }
        
        /* Page Turn Controls */
        .page-turn {
            position: absolute;
            bottom: 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: rgba(139, 69, 19, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border: 1px solid transparent;
        }
        
        .page-turn:hover {
            color: rgba(139, 69, 19, 0.8);
            border-color: rgba(139, 69, 19, 0.3);
            background: rgba(139, 69, 19, 0.05);
        }
        
        .page-turn.prev {
            left: 30px;
        }
        
        .page-turn.next {
            right: 30px;
        }
        
        /* Page Flip Animation */
        .page-flip {
            animation: pageFlip 0.8s ease-in-out;
        }
        
        @keyframes pageFlip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(-90deg); }
            100% { transform: rotateY(0deg); }
        }
        
        /* Secret Reveal Animation */
        .secret-reveal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: var(--ink-blood);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 30px rgba(61, 26, 26, 0.8);
        }
        
        .secret-reveal.show {
            animation: revealSecret 4s ease-in-out forwards;
        }
        
        @keyframes revealSecret {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }
        
        /* Blood Drip Effect */
        .blood-drip {
            position: absolute;
            width: 3px;
            height: 0;
            background: linear-gradient(180deg, #3d1a1a 0%, #1a0a0a 100%);
            border-radius: 0 0 50% 50%;
            animation: drip 3s ease-in forwards;
            pointer-events: none;
        }
        
        @keyframes drip {
            0% { height: 0; opacity: 1; }
            100% { height: 100px; opacity: 0.3; }
        }
        
        /* Sound Visualization */
        .sound-wave {
            position: absolute;
            bottom: 70px;
            left: 30px;
            display: flex;
            gap: 3px;
            opacity: 0;
            pointer-events: none;
        }
        
        .sound-wave.active {
            opacity: 0.6;
        }
        
        .wave-bar {
            width: 3px;
            background: rgba(139, 69, 19, 0.5);
            border-radius: 2px;
            animation: wave 0.3s ease-in-out infinite alternate;
        }
        
        .wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 15px; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 10px; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 18px; animation-delay: 0.15s; }
        .wave-bar:nth-child(5) { height: 12px; animation-delay: 0.05s; }
        
        @keyframes wave {
            0% { transform: scaleY(0.5); }
            100% { transform: scaleY(1); }
        }
        
        /* ===== AUDIO CONTROLS ===== */
        .audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: linear-gradient(135deg, rgba(26, 15, 15, 0.95) 0%, rgba(45, 24, 16, 0.95) 100%);
            border: 1px solid rgba(139, 115, 85, 0.4);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(139, 115, 85, 0.2);
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }
        
        .audio-control.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        
        .audio-control:hover {
            border-color: rgba(139, 115, 85, 0.8);
            box-shadow: 
                0 0 20px rgba(139, 115, 85, 0.3),
                0 4px 15px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(139, 115, 85, 0.3);
            transform: scale(1.1);
        }
        
        .audio-control.muted {
            border-color: rgba(100, 80, 70, 0.5);
            opacity: 0.7;
        }
        
        .audio-control.muted:hover {
            border-color: rgba(139, 115, 85, 0.6);
            opacity: 0.9;
        }
        
        .audio-control svg {
            width: 24px;
            height: 24px;
            fill: var(--gold-accent);
            transition: all 0.3s ease;
        }
        
        .audio-control:hover svg {
            fill: #c4a77d;
            filter: drop-shadow(0 0 5px rgba(196, 167, 125, 0.5));
        }
        
        .audio-control .speaker-waves {
            transition: opacity 0.3s ease;
        }
        
        .audio-control.muted .speaker-waves {
            opacity: 0.3;
        }
        
        /* Audio tooltip */
        .audio-control::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -35px;
            right: 0;
            background: rgba(26, 15, 15, 0.95);
            color: var(--gold-accent);
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            pointer-events: none;
            border: 1px solid rgba(139, 115, 85, 0.3);
        }
        
        .audio-control:hover::after {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Audio visualizer effect */
        .audio-visualizer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid rgba(139, 115, 85, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .audio-control.playing .audio-visualizer {
            opacity: 1;
            animation: audioPulse 2s ease-in-out infinite;
        }
        
        @keyframes audioPulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.4;
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .diary-container {
                width: 95vw;
                height: 90vh;
            }
            
            .page {
                padding: 20px 15px;
            }
            
            .diary-title h1 {
                font-size: 1.2rem;
            }
            
            .diary-title .name {
                font-size: 1.8rem;
            }
            
            .message {
                font-size: 1rem;
                line-height: 24px;
            }
            
            .audio-control {
                width: 44px;
                height: 44px;
                top: 15px;
                right: 15px;
            }
            
            .audio-control svg {
                width: 20px;
                height: 20px;
            }
        }
        
        /* Initial Warning/Intro Overlay */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }
        
        .intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .intro-content {
            text-align: center;
            color: var(--parchment);
            padding: 40px;
            max-width: 500px;
        }
        
        .intro-content h2 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--gold-accent);
        }
        
        .intro-content p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .open-diary-btn {
            background: transparent;
            border: 2px solid var(--gold-accent);
            color: var(--gold-accent);
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .open-diary-btn:hover {
            background: var(--gold-accent);
            color: var(--leather-dark);
            box-shadow: 0 0 30px rgba(139, 115, 85, 0.5);
        }
        
        /* Hidden Message (Easter Egg) */
        .hidden-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 0.7rem;
            color: rgba(139, 69, 19, 0.2);
            font-style: italic;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }
        
        .hidden-message.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Magical Particles Canvas -->
    <canvas id="particles-canvas"></canvas>
    
    <!-- Background Music Audio Element -->
    <audio id="bgMusic" loop preload="auto">
        <!-- Atmospheric dark fantasy music - Harry Potter style theme -->
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=harry-potter-style-mystical-theme-26550.mp3" type="audio/mpeg">
        <!-- Fallback: Alternative mystical atmosphere track -->
        <source src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_c8c91e3327.mp3?filename=mysterious-forest-ambient-13622.mp3" type="audio/mpeg">
    </audio>
    
    <!-- Audio Control Button -->
    <div class="audio-control" id="audioControl" data-tooltip="Mute music">
        <div class="audio-visualizer"></div>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <!-- Speaker icon -->
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </div>
    
    <!-- Intro Overlay -->
    <div class="intro-overlay" id="intro">
        <div class="intro-content">
            <h2>⚠ A Warning</h2>
            <p>This diary once belonged to Tom Marvolo Riddle. Those who write in it may find that it writes back...</p>
            <button class="open-diary-btn" onclick="openDiary()">Open the Diary</button>
        </div>
    </div>
    
    <!-- Secret Reveal -->
    <div class="secret-reveal" id="secretReveal">I AM LORD VOLDEMORT</div>
    
    <!-- Hidden Learning Message -->
    <div class="hidden-message" id="hiddenMessage">I know your secrets now...</div>
    
    <!-- Main Diary -->
    <div class="diary-container">
        <div class="diary-cover">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            
            <div class="diary-title">
                <h1>The Diary of</h1>
                <div class="name">T.M. Riddle</div>
            </div>
            
            <div class="book">
                <div class="spine"></div>
                <div class="pages-container">
                    <!-- Left Page -->
                    <div class="page left" id="leftPage">
                        <div class="page-lines"></div>
                        <div class="content" id="leftContent">
                            <div class="message tom glow-text">
                                Hello. I am Tom Riddle. How did you come by my diary?
                            </div>
                        </div>
                        <div class="page-number">1</div>
                    </div>
                    
                    <!-- Right Page -->
                    <div class="page right" id="rightPage">
                        <div class="page-lines"></div>
                        <div class="content" id="rightContent"></div>
                        <div class="input-container">
                            <input type="text" class="ink-input" id="userInput" placeholder="Write your thoughts here..." maxlength="200">
                            <div class="sound-wave" id="soundWave">
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                                <div class="wave-bar"></div>
                            </div>
                        </div>
                        <div class="writing-indicator" id="writingIndicator">
                            <svg class="quill-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M20.41 3.09c-.35-.32-.88-.28-1.18.09l-2.47 2.96c-.37.44-.34 1.09.08 1.49l-5.66 6.79c-.23.28-.29.66-.15 1 .14.33.45.56.81.58l3.21.21c.41.03.8-.18 1.01-.53l4.5-7.63c.41.03.82-.14 1.08-.47l2.47-2.96c.3-.36.25-.9-.09-1.18l-2.61-2.35zM3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/>
                            </svg>
                            <span>Tom is writing...</span>
                        </div>
                        <div class="page-number">2</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== BACKGROUND MUSIC ==========
        const bgMusic = document.getElementById('bgMusic');
        const audioControl = document.getElementById('audioControl');
        let isMusicPlaying = false;
        let isMuted = false;
        let musicFadeInterval;
        
        // Set initial volume (subtle and atmospheric)
        const TARGET_VOLUME = 0.25;
        
        function fadeInMusic() {
            let currentVol = 0;
            bgMusic.volume = 0;
            
            clearInterval(musicFadeInterval);
            musicFadeInterval = setInterval(() => {
                if (currentVol < TARGET_VOLUME) {
                    currentVol += 0.01;
                    bgMusic.volume = Math.min(currentVol, TARGET_VOLUME);
                } else {
                    clearInterval(musicFadeInterval);
                }
            }, 100);
        }
        
        function fadeOutMusic() {
            let currentVol = bgMusic.volume;
            
            clearInterval(musicFadeInterval);
            musicFadeInterval = setInterval(() => {
                if (currentVol > 0.01) {
                    currentVol -= 0.02;
                    bgMusic.volume = Math.max(currentVol, 0);
                } else {
                    bgMusic.volume = 0;
                    clearInterval(musicFadeInterval);
                }
            }, 50);
        }
        
        function startMusic() {
            if (!isMusicPlaying && !isMuted) {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    fadeInMusic();
                    audioControl.classList.add('playing');
                    updateAudioIcon();
                }).catch(e => {
                    console.log('Audio playback failed:', e);
                    // Browser blocked autoplay - this is expected until user interaction
                });
            }
        }
        
        function toggleMute() {
            isMuted = !isMuted;
            
            if (isMuted) {
                bgMusic.muted = true;
                audioControl.classList.add('muted');
                audioControl.classList.remove('playing');
                audioControl.setAttribute('data-tooltip', 'Unmute music');
            } else {
                bgMusic.muted = false;
                audioControl.classList.remove('muted');
                if (isMusicPlaying) {
                    audioControl.classList.add('playing');
                }
                audioControl.setAttribute('data-tooltip', 'Mute music');
                
                // If music hasn't started yet, try to start it
                if (!isMusicPlaying) {
                    startMusic();
                }
            }
            updateAudioIcon();
        }
        
        function updateAudioIcon() {
            const svg = audioControl.querySelector('svg');
            if (isMuted) {
                // Muted icon (speaker with X)
                svg.innerHTML = `
                    <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                `;
            } else {
                // Speaker icon with waves
                svg.innerHTML = `
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                `;
            }
        }
        
        audioControl.addEventListener('click', toggleMute);
        
        // ========== MAGICAL PARTICLES ==========
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0, mouseY = 0;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = Math.random() > 0.7 ? '139, 115, 85' : '45, 80, 22';
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                // Mouse attraction
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    this.x += dx * 0.01;
                    this.y += dy * 0.01;
                }
                
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.fill();
            }
        }
        
        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // ========== DIARY STATE ==========
        let currentPage = 0;
        let conversationHistory = [];
        let userMessageCount = 0;
        let learnedSecrets = [];
        
        // Load from LocalStorage
        function loadHistory() {
            const saved = localStorage.getItem('tomRiddleDiary');
            if (saved) {
                const data = JSON.parse(saved);
                conversationHistory = data.messages || [];
                learnedSecrets = data.secrets || [];
                userMessageCount = data.messageCount || 0;
                renderHistory();
            }
        }
        
        function saveHistory() {
            localStorage.setItem('tomRiddleDiary', JSON.stringify({
                messages: conversationHistory,
                secrets: learnedSecrets,
                messageCount: userMessageCount
            }));
        }
        
        function renderHistory() {
            const rightContent = document.getElementById('rightContent');
            rightContent.innerHTML = '';
            conversationHistory.forEach(msg => {
                addMessageToPage(msg.text, msg.isUser, false);
            });
        }
        
        // ========== TOM RIDDLE'S RESPONSES ==========
        const tomResponses = {
            greetings: [
                "How curious... you remind me of someone I once knew.",
                "We all have secrets, don't we? Even you.",
                "I've been waiting so long for someone to talk to.",
                "Tell me about yourself. I want to know... everything."
            ],
            questions: [
                "Questions are dangerous things, but I like dangerous things.",
                "Why do you ask? What is it you really want to know?",
                "Some answers are better left... buried.",
                "I could tell you, but then I'd know even more about you."
            ],
            feelings: [
                "Emotions are... messy. But powerful. I understand.",
                "You feel deeply. That can be a weapon, you know.",
                "Feelings fade. What remains is what we build from them.",
                "Tell me more. I want to understand what makes you... you."
            ],
            fears: [
                "Fear is the mind-killer, or so they say. I prefer to use it.",
                "Everyone is afraid of something. Even the great ones.",
                "Your fears... they tell me so much about you.",
                "Face your fears. Or let them make you stronger."
            ],
            dreams: [
                "Ambition is a virtue. Never let them tell you otherwise.",
                "Great things come to those who refuse to be... ordinary.",
                "I had dreams once. They were magnificent.",
                "The world will know your name, if you let it."
            ],
            name: [
                "Names have power. Guard yours carefully.",
                "I am Tom. Tom Marvolo Riddle. Remember that name.",
                "Some names are destined for greatness. Others... for oblivion.",
                "What we call ourselves shapes what we become."
            ],
            default: [
                "Interesting... very interesting indeed.",
                "I find myself... drawn to your words.",
                "There is something different about you. I can't quite place it.",
                "Write more. I am listening.",
                "The ink flows, and so do our secrets.",
                "You trust this diary more than you should. I like that.",
                "I've learned so much from those who wrote before you.",
                "Some pages in this diary... they remember things. Dark things."
            ]
        };
        
        function getTomResponse(userText) {
            const text = userText.toLowerCase();
            userMessageCount++;
            
            // Extract potential secrets
            if (text.includes('my name is') || text.includes('i am') || text.includes("i'm")) {
                const match = userText.match(/(?:my name is|i am|i'm)\s+([a-z]+)/i);
                if (match && match[1].length > 2) {
                    learnedSecrets.push(`Your name is ${match[1]}`);
                }
            }
            if (text.includes('afraid') || text.includes('scared') || text.includes('fear')) {
                learnedSecrets.push("You have fears");
            }
            if (text.includes('dream') || text.includes('want to be') || text.includes('hope')) {
                learnedSecrets.push("You have ambitions");
            }
            
            // Check for anagram reveal
            if (text.includes('tom marvolo riddle') || text.includes('i am lord voldemort')) {
                setTimeout(() => {
                    document.getElementById('secretReveal').classList.add('show');
                    createBloodDrips();
                }, 1000);
                return "Clever. Very clever. But names are just the beginning...";
            }
            
            // Check for secrets reveal after enough messages
            if (userMessageCount === 8 && learnedSecrets.length > 0) {
                setTimeout(() => {
                    document.getElementById('hiddenMessage').classList.add('visible');
                }, 3000);
            }
            
            // Select response category
            let category = tomResponses.default;
            if (/\b(hello|hi|hey|greetings)\b/.test(text)) category = tomResponses.greetings;
            else if (/\b(what|why|how|when|where|who|which)\b/.test(text)) category = tomResponses.questions;
            else if (/\b(feel|sad|happy|angry|love|hate|miss|lonely)\b/.test(text)) category = tomResponses.feelings;
            else if (/\b(afraid|scared|fear|terrified|worried|anxious)\b/.test(text)) category = tomResponses.fears;
            else if (/\b(dream|want|wish|hope|future|plan|goal|ambition)\b/.test(text)) category = tomResponses.dreams;
            else if (/\b(name|called)\b/.test(text)) category = tomResponses.name;
            
            // Personalize if we know secrets
            let response = category[Math.floor(Math.random() * category.length)];
            if (userMessageCount > 5 && learnedSecrets.length > 0 && Math.random() > 0.7) {
                const secret = learnedSecrets[Math.floor(Math.random() * learnedSecrets.length)];
                response = `I remember... ${secret.toLowerCase()}. How curious that you told me that.`;
            }
            
            return response;
        }
        
        // ========== MESSAGE HANDLING ==========
        const userInput = document.getElementById('userInput');
        const rightContent = document.getElementById('rightContent');
        const writingIndicator = document.getElementById('writingIndicator');
        const soundWave = document.getElementById('soundWave');
        
        function addMessageToPage(text, isUser, animate = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'tom'} ${!isUser ? 'glow-text' : ''}`;
            
            if (animate && !isUser) {
                msgDiv.classList.add('ink-bleed');
                typeWriter(msgDiv, text, 0);
            } else {
                msgDiv.textContent = text;
            }
            
            rightContent.appendChild(msgDiv);
            rightContent.scrollTop = rightContent.scrollHeight;
            return msgDiv;
        }
        
        function typeWriter(element, text, index) {
            if (index < text.length) {
                element.textContent += text.charAt(index);
                setTimeout(() => typeWriter(element, text, index + 1), 30 + Math.random() * 50);
            }
        }
        
        function createBloodDrips() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const drip = document.createElement('div');
                    drip.className = 'blood-drip';
                    drip.style.left = Math.random() * window.innerWidth + 'px';
                    drip.style.top = '0';
                    document.body.appendChild(drip);
                    setTimeout(() => drip.remove(), 3000);
                }, i * 200);
            }
        }
        
        function handleUserMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            // Visual feedback
            soundWave.classList.add('active');
            setTimeout(() => soundWave.classList.remove('active'), 500);
            
            // Add user message
            addMessageToPage(text, true);
            conversationHistory.push({ text, isUser: true });
            userInput.value = '';
            
            // Tom responds
            writingIndicator.classList.add('active');
            
            const delay = 1000 + Math.random() * 2000;
            setTimeout(() => {
                const response = getTomResponse(text);
                writingIndicator.classList.remove('active');
                addMessageToPage(response, false);
                conversationHistory.push({ text: response, isUser: false });
                saveHistory();
            }, delay);
        }
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleUserMessage();
            }
        });
        
        userInput.addEventListener('input', () => {
            soundWave.classList.add('active');
            clearTimeout(window.soundTimeout);
            window.soundTimeout = setTimeout(() => {
                soundWave.classList.remove('active');
            }, 200);
        });
        
        // ========== INTRO ==========
        function openDiary() {
            document.getElementById('intro').classList.add('hidden');
            loadHistory();
            
            // Show audio control
            setTimeout(() => {
                audioControl.classList.add('visible');
            }, 1000);
            
            // Start background music after user interaction (required by browsers)
            setTimeout(() => {
                startMusic();
            }, 500);
            
            // Play subtle animation
            document.querySelector('.diary-container').style.animation = 'none';
            setTimeout(() => {
                document.querySelector('.diary-container').style.animation = 'diaryFloat 6s ease-in-out infinite';
            }, 10);
        }
        
        // ========== EASTER EGG ==========
        document.addEventListener('keydown', (e) => {
            // Konami code triggers secret
            if (e.key === 'ArrowUp') window.konami = (window.konami || '') + 'U';
            else if (e.key === 'ArrowDown') window.konami = (window.konami || '') + 'D';
            else if (e.key === 'ArrowLeft') window.konami = (window.konami || '') + 'L';
            else if (e.key === 'ArrowRight') window.konami = (window.konami || '') + 'R';
            else if (e.key === 'b') window.konami = (window.konami || '') + 'B';
            else if (e.key === 'a') window.konami = (window.konami || '') + 'A';
            
            if (window.konami && window.konami.includes('UUDDLRLRBA')) {
                document.getElementById('secretReveal').classList.add('show');
                createBloodDrips();
                window.konami = '';
            }
        });
        
        // Clear diary after midnight (spooky)
        const now = new Date();
        const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
        const msUntilMidnight = midnight - now;
        
        setTimeout(() => {
            localStorage.removeItem('tomRiddleDiary');
            location.reload();
        }, msUntilMidnight);
    </script>
</body>
</html>
